<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYMPOSION L'ABSOLU | Gastronomie Royale</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="smoke-overlay"></div>

    <header class="royal-hall">
        <div class="avatar-throne">
            <img src="Monsieur Roland.jpg" id="sir-roland" alt="Sir Roland Absolute">
        </div>
        <h1 class="main-title">SYMPOSION</h1>
        <h2 class="sub-title">L'ABSOLU</h2>
        <p class="clan-subtitle">⚜ ARCHITECTURE GASTRONOMIQUE DES ROIS ⚜</p>
    </header>

    <main class="banquet-table">
        <section class="runes-container">
            <div class="rune-card">
                <img src="viking_hache.jpg" class="viking-guard v-axe" alt="Garde à la Hache">
                <div class="rune-label">L'ART DU FEU</div>
            </div>
            
            <div class="rune-card">
                <img src="viking_lance.jpg" class="viking-guard v-spear" alt="Garde à la Lance">
                <div class="rune-label">L'ÂME DU GOÛT</div>
            </div>
        </section>

        <section class="master-project">
            <div class="shield-frame">
                <div class="project-info">
                    <h3>SAVEUR 01 : L'EXOSQUELETTE</h3>
                    <p>La structure brute de la perfection culinaire viking.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 - SYMPOSION L'ABSOLU - TOUS SYSTÈMES OPÉRATIONNELS</p>
    </footer>
</body>
</html>
